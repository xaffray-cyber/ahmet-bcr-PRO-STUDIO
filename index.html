:root{
  --bg:#060606;
  --s1:#0b0b0b;
  --s2:#101010;
  --s3:#161616;
  --s4:#1d1d1d;
  --border:rgba(255,255,255,0.05);
  --border2:rgba(255,255,255,0.09);
  --border3:rgba(255,255,255,0.16);
  --text:#f4f1ea;
  --text2:#b2aa9b;
  --muted:#6e675d;
  --accent:#d6a23a;
  --accent2:#f2d089;
  --accent-d:rgba(214,162,58,0.08);
  --accent-g:rgba(214,162,58,0.22);
  --gold-line:rgba(214,162,58,0.18);
  --gold-soft:rgba(214,162,58,0.06);
  --panel-shadow:0 18px 60px rgba(0,0,0,0.55);


.header{
  height:76px;
  padding:0 42px;
  background:linear-gradient(180deg, rgba(14,11,7,0.98) 0%, rgba(8,8,8,0.96) 100%) !important;
  border-bottom:1px solid rgba(214,162,58,0.14) !important;
  box-shadow:
    0 1px 0 rgba(214,162,58,0.10),
    0 14px 34px rgba(0,0,0,0.42),
    inset 0 1px 0 rgba(255,232,179,0.05) !important;
}

.header::before{
  left:7%;
  right:7%;
  background:linear-gradient(90deg, transparent, rgba(214,162,58,0.46), transparent);
}

.logo-name{
  font-size:17px;
  letter-spacing:1.4px;
  background:linear-gradient(135deg,#fffdf7 0%, #f5deaa 36%, #d6a23a 100%);
}

.logo-sub{
  font-size:8px;
  letter-spacing:4.6px;
  color:rgba(214,162,58,0.72);
}

.hc-pill,
.matrix-toggle{
  background:linear-gradient(180deg, rgba(33,26,15,0.95) 0%, rgba(16,14,10,0.98) 100%) !important;
  border:1px solid rgba(214,162,58,0.16) !important;
  color:var(--text2) !important;
  box-shadow:
    0 4px 16px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,226,155,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.26) !important;
}

.matrix-toggle.on .mt-label,
.matrix-toggle.on .mt-icon{
  color:var(--accent2) !important;
}

.left{
  background:
    linear-gradient(180deg, rgba(12,11,10,0.96) 0%, rgba(8,8,8,0.98) 100%),
    radial-gradient(circle at top, rgba(214,162,58,0.04), transparent 24%) !important;
  border-right:1px solid rgba(214,162,58,0.08) !important;
}

.right{
  background:
    linear-gradient(180deg, rgba(9,9,9,0.96) 0%, rgba(6,6,6,1) 100%) !important;
}

.sec{
  background:linear-gradient(180deg, rgba(214,162,58,0.018) 0%, rgba(255,255,255,0) 100%) !important;
  border-bottom:1px solid rgba(214,162,58,0.08) !important;
}

.sec-head{
  padding:18px 28px 12px;
}

.sec-body,
.gen-wrap{
  padding-left:28px !important;
  padding-right:28px !important;
}

.sec-num{
  width:24px;
  height:24px;
  border-radius:999px;
  color:var(--accent2);
  background:linear-gradient(180deg, rgba(214,162,58,0.12) 0%, rgba(214,162,58,0.06) 100%);
  border:1px solid rgba(214,162,58,0.18);
  box-shadow:inset 0 1px 0 rgba(255,225,145,0.08);
}

.sec-lbl{
  font-size:11px;
  letter-spacing:1.1px;
  color:#d7c29a;
}

.field-lbl{
  color:#d4be91;
  font-size:8px;
  letter-spacing:3px;
}

.field-lbl::after{
  background:linear-gradient(90deg, rgba(214,162,58,0.14), transparent 88%);
}

.fc-input,
.scene-prompt-wrap textarea{
  background:linear-gradient(180deg, #0a0a0a 0%, #121212 100%) !important;
  border:1px solid rgba(214,162,58,0.10) !important;
  color:#f1ede3 !important;
  border-radius:10px !important;
  box-shadow:
    inset 0 3px 12px rgba(0,0,0,0.52),
    inset 0 1px 1px rgba(255,255,255,0.02),
    0 1px 0 rgba(255,226,155,0.03) !important;
}

.fc-input:focus,
.scene-prompt-wrap textarea:focus{
  border-color:rgba(214,162,58,0.55) !important;
  box-shadow:
    0 0 0 3px rgba(214,162,58,0.10),
    0 0 18px rgba(214,162,58,0.08),
    inset 0 3px 12px rgba(0,0,0,0.52) !important;
}

.inp-action,
.key-save-btn,
.key-clear-btn,
.copy-btn{
  border-radius:999px !important;
  font-size:8px !important;
  letter-spacing:1.8px !important;
  text-transform:uppercase;
}

.inp-action{
  background:linear-gradient(180deg,#1a1712 0%, #12100c 100%) !important;
  border:1px solid rgba(214,162,58,0.16) !important;
  color:#d9c49e !important;
}

.key-save-btn{
  background:linear-gradient(180deg, rgba(214,162,58,0.12) 0%, rgba(214,162,58,0.07) 100%) !important;
  border-color:rgba(214,162,58,0.28) !important;
  color:var(--accent2) !important;
}

.key-clear-btn{
  background:linear-gradient(180deg, rgba(110,35,35,0.18) 0%, rgba(60,16,16,0.18) 100%) !important;
}

.mode-btn,
.ctrl,
.upload-zone,
.rcard,
.status-card,
.a-item{
  border-radius:14px !important;
}

.mode-btn{
  padding:15px 15px 14px;
  background:linear-gradient(180deg, rgba(25,21,16,0.96) 0%, rgba(14,13,11,0.98) 100%) !important;
  border:1px solid rgba(214,162,58,0.10) !important;
  box-shadow:
    0 10px 26px rgba(0,0,0,0.40),
    inset 0 1px 0 rgba(255,224,148,0.03),
    inset 0 -2px 6px rgba(0,0,0,0.35) !important;
}

.mode-btn:hover{
  transform:translateY(-1px);
  border-color:rgba(214,162,58,0.24) !important;
  box-shadow:
    0 14px 32px rgba(0,0,0,0.46),
    0 0 0 1px rgba(214,162,58,0.05),
    inset 0 1px 0 rgba(255,224,148,0.05) !important;
}

.mode-btn.active{
  background:linear-gradient(180deg, rgba(35,28,16,0.98) 0%, rgba(20,17,12,1) 100%) !important;
  border-color:rgba(214,162,58,0.36) !important;
  box-shadow:
    0 16px 40px rgba(214,162,58,0.10),
    0 10px 24px rgba(0,0,0,0.42),
    inset 0 1px 0 rgba(255,231,171,0.06) !important;
}

.mode-lbl,
.ctrl-name,
.up-label,
.rcard-title{
  letter-spacing:0.8px;
}

.mode-desc,
.up-hint-txt,
.a-val,
.prompt-txt{
  color:#c9c0b1 !important;
}

.mode-btn.active .mode-desc{
  color:#e1d4bc !important;
}

.mode-btn.active .mode-lbl,
.ctrl.on .ctrl-name,
.up-tag,
.status-t,
.right-title,
.bh,
.sec-num,
.sec-lbl,
.field-lbl,
.rcard-title{
  color:var(--accent2) !important;
}

.upload-zone{
  background:
    radial-gradient(circle at top, rgba(214,162,58,0.05), transparent 38%),
    linear-gradient(180deg, rgba(18,16,13,0.98) 0%, rgba(11,11,11,1) 100%) !important;
  border:1px dashed rgba(214,162,58,0.14) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,224,148,0.03),
    inset 0 -8px 24px rgba(0,0,0,0.34),
    0 14px 28px rgba(0,0,0,0.28) !important;
}

.upload-zone:hover,
.upload-zone.drag{
  border-color:rgba(214,162,58,0.30) !important;
  box-shadow:
    0 16px 34px rgba(0,0,0,0.35),
    0 0 0 1px rgba(214,162,58,0.06),
    inset 0 -8px 24px rgba(0,0,0,0.34) !important;
}

.up-icon-wrap{
  width:48px;
  height:48px;
  border-radius:14px;
  background:linear-gradient(180deg,#1c1710 0%, #11100d 100%) !important;
  border:1px solid rgba(214,162,58,0.14) !important;
  box-shadow:0 8px 20px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,226,155,0.04);
}

.up-tag{
  border-radius:999px;
  padding:5px 10px;
  background:rgba(9,9,9,0.86) !important;
  border:1px solid rgba(214,162,58,0.20) !important;
  box-shadow:0 6px 20px rgba(0,0,0,0.35);
}

.up-check{
  width:24px;
  height:24px;
  box-shadow:0 0 16px rgba(214,162,58,0.22);
}

.ctrl{
  min-height:48px;
  background:linear-gradient(180deg, rgba(23,20,16,0.96) 0%, rgba(13,13,12,1) 100%) !important;
  border:1px solid rgba(214,162,58,0.08) !important;
  box-shadow:
    0 10px 24px rgba(0,0,0,0.32),
    inset 0 1px 0 rgba(255,224,148,0.03) !important;
}

.ctrl:hover{
  border-color:rgba(214,162,58,0.18) !important;
}

.ctrl.on{
  background:linear-gradient(180deg, rgba(35,27,14,0.96) 0%, rgba(18,15,11,1) 100%) !important;
  border-color:rgba(214,162,58,0.30) !important;
  box-shadow:
    0 14px 28px rgba(214,162,58,0.08),
    0 10px 22px rgba(0,0,0,0.34),
    inset 0 1px 0 rgba(255,231,171,0.05) !important;
}

.ctrl-switch{
  width:34px;
  height:18px;
  border-radius:999px;
  background:linear-gradient(180deg,#202020 0%, #141414 100%) !important;
}

.ctrl-switch::after{
  top:2px;
  left:2px;
  width:12px;
  height:12px;
}

.ctrl.on .ctrl-switch::after{
  left:18px;
  background:linear-gradient(180deg, #f4d894 0%, #d6a23a 100%) !important;
  box-shadow:0 0 10px rgba(214,162,58,0.26);
}

.gen-wrap{
  padding-top:24px !important;
  padding-bottom:28px !important;
}

.gen-btn{
  min-height:84px;
  border-radius:16px !important;
  background:
    radial-gradient(circle at top center, rgba(255,214,122,0.12), transparent 42%),
    linear-gradient(180deg, #1c160d 0%, #0d0b08 100%) !important;
  border:1px solid rgba(214,162,58,0.42) !important;
  box-shadow:
    0 18px 44px rgba(214,162,58,0.12),
    0 10px 28px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,230,170,0.08),
    inset 0 -8px 14px rgba(0,0,0,0.34) !important;
}

.gen-btn:hover{
  border-color:rgba(214,162,58,0.72) !important;
  box-shadow:
    0 24px 54px rgba(214,162,58,0.18),
    0 12px 32px rgba(0,0,0,0.48),
    inset 0 1px 0 rgba(255,234,184,0.10),
    inset 0 -8px 14px rgba(0,0,0,0.34) !important;
}

.btn-text{
  color:#f1d598 !important;
  font-size:9px;
  letter-spacing:3.2px;
}

.right-head{
  height:58px;
  padding:0 32px;
  background:linear-gradient(180deg, rgba(12,11,10,0.96) 0%, rgba(8,8,8,0.94) 100%) !important;
  border-bottom:1px solid rgba(214,162,58,0.08) !important;
  backdrop-filter:blur(24px);
}

.right-body{
  padding:28px 32px;
  gap:18px;
}

.result-count,
.empty-s,
.a-key,
.json-txt,
.step-text{
  color:var(--text2) !important;
}

.result-badge,
.improve-badge{
  border-radius:999px;
}

.empty-t{
  font-size:34px;
  color:rgba(255,234,196,0.16);
}

.empty-center{
  background:linear-gradient(180deg,#f0d48c 0%, #d6a23a 100%) !important;
  color:#1a1207;
}

.status-card,
.rcard{
  background:linear-gradient(180deg, rgba(18,16,13,0.98) 0%, rgba(11,11,11,1) 100%) !important;
  border:1px solid rgba(214,162,58,0.10) !important;
  box-shadow:
    0 16px 38px rgba(0,0,0,0.34),
    inset 0 1px 0 rgba(255,226,155,0.03) !important;
}

.rcard:hover{
  transform:translateY(-2px);
  border-color:rgba(214,162,58,0.18) !important;
}

.rcard-head{
  padding:14px 18px;
  background:linear-gradient(180deg, rgba(214,162,58,0.028) 0%, rgba(255,255,255,0) 100%) !important;
  border-bottom:1px solid rgba(214,162,58,0.08) !important;
}

.rtag{
  border-radius:999px;
  padding:4px 9px;
  letter-spacing:1.8px;
}

.a-tabs{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(214,162,58,0.08);
  border-radius:12px;
  padding:4px;
}

.a-tab{
  border-radius:9px;
  letter-spacing:1.4px;
}

.a-tab.active{
  background:linear-gradient(180deg, rgba(36,28,16,0.96) 0%, rgba(20,18,13,1) 100%);
  color:#f2ddac;
  box-shadow:inset 0 1px 0 rgba(255,226,155,0.04);
}

.a-content.active{
  gap:10px;
}

.a-item{
  padding:11px 12px;
  background:linear-gradient(180deg, rgba(20,19,17,0.98) 0%, rgba(14,14,14,1) 100%) !important;
  border:1px solid rgba(214,162,58,0.08) !important;
}

.a-item:hover{
  border-color:rgba(214,162,58,0.16) !important;
}

.a-key{
  color:#b79d6f !important;
}

.prompt-txt{
  font-size:13px;
  line-height:1.9;
  color:#f0ede5 !important;
}

.prompt-txt.neg{
  color:#f4a5a5 !important;
}

.json-txt{
  background:rgba(255,255,255,0.015);
  border:1px solid rgba(214,162,58,0.06);
  border-radius:12px;
  padding:12px;
}

.copy-btn{
  background:linear-gradient(180deg, rgba(24,22,18,0.96) 0%, rgba(15,15,14,1) 100%);
  border:1px solid rgba(214,162,58,0.12) !important;
  color:#d5c3a0 !important;
  padding:6px 13px;
}

.copy-btn:hover{
  color:#fff1cf !important;
  border-color:rgba(214,162,58,0.28) !important;
  box-shadow:0 8px 20px rgba(0,0,0,0.20);
}

.copy-btn.copied{
  background:rgba(80,227,164,0.06) !important;
}

.err-box{
  border-radius:12px;
  border:1px solid rgba(224,85,85,0.18);
  background:linear-gradient(180deg, rgba(80,20,20,0.16) 0%, rgba(28,11,11,0.28) 100%);
  box-shadow:0 10px 26px rgba(0,0,0,0.22);
}

@media(max-width:900px){
  .header{
    padding:0 18px;
    height:70px;
  }

  .sec-head,
  .sec-body,
  .gen-wrap,
  .right-body,
  .right-head{
    padding-left:18px !important;
    padding-right:18px !important;
  }

  .uploads,
  .controls,
  .modes{
    gap:10px;
  }
}
